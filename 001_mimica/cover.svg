<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="text-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Solid background matching the title (soft mint to contrast pink title) -->
  <rect width="1200" height="400" fill="#E8FFF2" />

  <!-- Large centered title only (no other graphic elements) -->
  <text x="600" y="170" font-family="'Cooper Black', 'Comic Sans MS', Arial, sans-serif" font-size="120" fill="#FF3E96" text-anchor="middle" font-weight="800" filter="url(#text-shadow)">Charadas — Mímica</text>

  <!-- Subtitle centered and more prominent -->
  <text x="600" y="250" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#14532d" text-anchor="middle" font-weight="700" filter="url(#text-shadow)">Filmes • Jogos — 10 segundos para explicar</text>

</svg>
